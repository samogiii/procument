services:
  # ── SQL Server Database ──
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: procument-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (.NET 10 API) ──
  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: procument-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpirationInMinutes: ${JWT_EXPIRATION}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Nuxt 4) ──
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: procument-client
    environment:
      NUXT_PUBLIC_API_BASE: "/api"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: procument-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  sqlserver-data:
